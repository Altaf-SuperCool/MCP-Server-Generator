version: '3.8'

services:
  my-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-mcp-server
    environment:
      - NODE_ENV=production
      - API_BASE_URL=https://api.github.com
    env_file:
      - .env
    restart: unless-stopped
    # STDIO transport - use stdin/stdout
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "echo", "OK"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mcp-network:
    driver: bridge

volumes:
  logs: