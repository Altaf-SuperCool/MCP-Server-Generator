apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-mcp-server
  labels:
    app: my-mcp-server
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-mcp-server
  template:
    metadata:
      labels:
        app: my-mcp-server
        version: v1
    spec:
      containers:
      - name: my-mcp-server
        image: my-mcp-server:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_BASE_URL
          value: "https://api.github.com"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: my-mcp-server
  labels:
    app: my-mcp-server
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: my-mcp-server